server {
    listen       8080;
    server_name  localhost;
    root   /usr/share/nginx/html;

    # Redirect explicit .html requests to clean URLs
    location = /Home.html {
        return 301 /home;
    }

    location = /EA.html {
        return 301 /ea;
    }

    location = /index.html {
        return 301 /cpa;
    }

    location ~* ^(.*)\.html$ {
        return 301 $1;
    }

    # Map clean URLs to their respective HTML files
    location = / {
        try_files /Home.html =404;
    }

    location = /home {
        try_files /Home.html =404;
    }

    location = /ea {
        try_files /EA.html =404;
    }

    location = /cpa {
        try_files /index.html =404;
    }

    # Fallback to try .html automatically
    location / {
        try_files $uri $uri.html $uri/ /Home.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
